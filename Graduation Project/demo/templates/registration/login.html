{% extends 'base.html' %}

{% block title %}登录 - 校园二手交易平台{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">用户登录</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        {% if form.errors %}
                            <div class="alert alert-danger">
                                用户名或密码错误，请重试。
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label for="id_username" class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_email" class="form-label">校园邮箱 (非管理员必填)</label>
                            <input type="email" name="email" class="form-control" id="id_email" placeholder="格式：学号@ncjti.edu.cn">
                        </div>

                        <div class="mb-3">
                            <label for="id_password" class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" id="id_password" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">登录</button>
                        </div>
                    </form>

                    <div class="mt-3 text-center">
                        <p class="mb-0">
                            还没有账号？
                            <a href="{% url 'register' %}" class="text-decoration-none">立即注册</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var form = document.querySelector('form');
    var emailInput = document.getElementById('id_email');
    var usernameInput = document.getElementById('id_username');
    
    if (form && emailInput) {
        form.addEventListener('submit', function(e) {
            var email = emailInput.value.trim();
            var username = usernameInput ? usernameInput.value.trim() : '';
            var emailRegex = /^[a-zA-Z0-9_.-]+@ncjti\.edu\.cn$/;
            
            if (username === 'admin' || username === 'testuser') {
                return;
            }
            
            if (!emailRegex.test(email)) {
                e.preventDefault();
                alert('【格式错误】\\n除管理员外，登录请务必提供您的校园邮箱！\\n格式要求：学号@ncjti.edu.cn');
                emailInput.focus();
                emailInput.style.border = '2px solid #d9534f';
                emailInput.style.boxShadow = '0 0 5px rgba(217, 83, 79, 0.5)';
            }
        });

        emailInput.addEventListener('input', function() {
            this.style.border = '';
            this.style.boxShadow = '';
        });
    }
});
</script>
{% endblock %}
